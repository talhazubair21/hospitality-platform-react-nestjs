services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      MONGODB_URI: ${MONGODB_URI:-mongodb://host.docker.internal:27017/bookings}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
